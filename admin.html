<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OGV Admin</title>

  <link rel="manifest" href="admin-manifest.webmanifest">
  <link rel="icon" href="icon-512.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="background-color" content="#ffffff">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .app-frame-wrapper {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      inset: 0;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #ffffff;
    }

    .fallback {
      display: none;
      padding: 24px;
      font-size: 16px;
      line-height: 1.5;
    }

    .fallback a {
      color: #0b57d0;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="app-frame-wrapper">
    <iframe
      id="ogv-admin-frame"
      src="https://script.google.com/macros/s/AKfycbw8wDAqfoUfqDwFcFz2mJyXPRVDcy1LWwmVrmQ_49Lx_x8_3KtjZovKxKc0WhF_3uTEyQ/exec?mode=admin"
      title="OGV Admin"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </div>

  <noscript>
    <div class="fallback">
      JavaScript ist deaktiviert. Öffne den Admin direkt:
      <br>
      <a href="https://script.google.com/macros/s/AKfycbw8wDAqfoUfqDwFcFz2mJyXPRVDcy1LWwmVrmQ_49Lx_x8_3KtjZovKxKc0WhF_3uTEyQ/exec?mode=admin">
        OGV Admin öffnen
      </a>
    </div>
  </noscript>
</body>
</html>
