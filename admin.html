<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OGV Admin</title>

  <link rel="manifest" href="admin-manifest.webmanifest">
  <link rel="icon" href="icon-512.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="background-color" content="#ffffff">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    .app-frame-wrapper {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      inset: 0;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #ffffff;
    }
  </style>
</head>

<body>
  <div class="app-frame-wrapper">
    <iframe
      id="ogv-admin-frame"
      title="OGV Admin"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </div>

  <script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw8wDAqfoUfqDwFcFz2mJyXPRVDcy1LWwmVrmQ_49Lx_x8_3KtjZovKxKc0WhF_3uTEyQ/exec';

    const params = new URLSearchParams(window.location.search);

    const allowedModes = new Set([
      'admin',
      'vorplanung_admin',
      'leitstand_admin',
      'zollkontakte_admin',
      'jahresarchiv_admin',
      'vorgang'
    ]);

    const requestedMode = (params.get('mode') || 'admin').trim().toLowerCase();
    const mode = allowedModes.has(requestedMode) ? requestedMode : 'admin';

    const appParams = new URLSearchParams();
    appParams.set('mode', mode);

    if (mode === 'vorgang') {
      appParams.set('origin', 'admin');
    }

    document.getElementById('ogv-admin-frame').src = WEBAPP_URL + '?' + appParams.toString();
  </script>
</body>
</html>
