<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGV Admin</title>

  <link rel="manifest" href="admin-manifest.webmanifest">
  <link rel="icon" href="icon-512.png">
  <meta name="theme-color" content="#ff00cc">
  <meta name="background-color" content="#ff00cc">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #ff00cc;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-family: Arial, sans-serif;
      font-size: 22px;
      font-weight: 900;
    }
  </style>
</head>

<body>
  <div>OGV Admin wird geladen...</div>

  <script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbw8wDAqfoUfqDwFcFz2mJyXPRVDcy1LWwmVrmQ_49Lx_x8_3KtjZovKxKc0WhF_3uTEyQ/exec';

    const params = new URLSearchParams(window.location.search);

    const allowedModes = new Set([
      'admin',
      'index',
      'vorplanung',
      'brandplanung',
      'maischeannahme',
      'brennfreigabe',
      'leitstand',
      'zollkontakte'
    ]);

    const requestedMode = (params.get('mode') || 'admin').trim().toLowerCase();
    const mode = allowedModes.has(requestedMode) ? requestedMode : 'admin';
    const origin = (params.get('origin') || 'admin').trim().toLowerCase();

    const appParams = new URLSearchParams();
    appParams.set('mode', mode);
    appParams.set('origin', origin || 'admin');

    // Wir leiten JEDEN Modus direkt an Google weiter – ohne blockierenden iFrame!
    const zielUrl = WEBAPP_URL + '?' + appParams.toString();
    window.location.replace(zielUrl);
  </script>
</body>
</html>
