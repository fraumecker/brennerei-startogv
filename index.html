<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brennerei</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
    }

    .app-frame-wrapper {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
      background: #ffffff;
    }

    .app-frame {
      width: 100%;
      height: calc(100vh + 55px);
      border: 0;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>
  <div class="app-frame-wrapper">
    <iframe
      class="app-frame"
      src="https://script.google.com/macros/s/AKfycbw8wDAqfoUfqDwFcFz2mJyXPRVDcy1LWwmVrmQ_49Lx_x8_3KtjZovKxKc0WhF_3uTEyQ/exec">
    </iframe>
  </div>
</body>
</html>
