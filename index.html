<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGV Brennerei</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-512.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="background-color" content="#ffffff">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }
    .app-frame-wrapper {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #ffffff;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #ffffff;
    }
  </style>
</head>
<body>
  <div class="app-frame-wrapper">
    <iframe
      id="ogv-app-frame"
      title="OGV Brennerei"
      allow="clipboard-read; clipboard-write"
    ></iframe>
  </div>
  <script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwHI0lQdC5G2PaAPJ1wk7kxnRZNfOXCB5sYXP77PcthXR6lO9sYveeqtAEqSSsMANOfQQ/exec';
    const params = new URLSearchParams(window.location.search);
    const allowedModes = new Set([
      'index',
      'vorplanung',
      'vorgang',
      'maischeannahme',
      'brennfreigabe',
      'leitstand',
      'zollkontakte',
      'jahresarchiv',
      'cockpit'
    ]);
    const requestedMode = (params.get('mode') || 'index').trim().toLowerCase();
    const mode = allowedModes.has(requestedMode) ? requestedMode : 'index';
    const appParams = new URLSearchParams();
    appParams.set('mode', mode);
    document.getElementById('ogv-app-frame').src = WEBAPP_URL + '?' + appParams.toString();
  </script>
</body>
</html>
