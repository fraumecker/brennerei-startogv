<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OGV Brennerei</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-512.png">
  <meta name="theme-color" content="#ffffff">
  <meta name="background-color" content="#ffffff">
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
    }
    a {
      color: #1a5f2a;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <p>Brennerei wird geöffnet. <a id="fallback" href="#">Direkt öffnen</a></p>
  <script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwHI0lQdC5G2PaAPJ1wk7kxnRZNfOXCB5sYXP77PcthXR6lO9sYveeqtAEqSSsMANOfQQ/exec';
    const params = new URLSearchParams(window.location.search);
    const allowedModes = new Set([
      'index',
      'vorplanung',
      'vorgang',
      'maischeannahme',
      'brennfreigabe',
      'leitstand',
      'zollkontakte',
      'jahresarchiv',
      'cockpit'
    ]);
    const requestedMode = (params.get('mode') || 'index').trim().toLowerCase();
    const mode = allowedModes.has(requestedMode) ? requestedMode : 'index';
    const appParams = new URLSearchParams();
    appParams.set('mode', mode);
    const targetUrl = WEBAPP_URL + '?' + appParams.toString();
    document.getElementById('fallback').href = targetUrl;
    window.location.replace(targetUrl);
  </script>
</body>
</html>
